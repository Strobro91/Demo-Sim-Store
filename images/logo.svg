<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50">
  <defs>
    <style>
      .logo-main { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- "NO." text — white, bold -->
  <text x="2" y="30" class="logo-main"
        font-size="32" font-weight="800" fill="#f5f5f5"
        letter-spacing="-0.5">NO.</text>

  <!-- "1" text — orange, bold, slightly larger for emphasis -->
  <text x="76" y="30" class="logo-main"
        font-size="36" font-weight="900" fill="#ff6b2b"
        letter-spacing="-1">1</text>

  <!-- Checkered flag accent (small, tucked next to the "1") -->
  <g transform="translate(100, 4)">
    <!-- 3x3 checkered pattern, angled for dynamism -->
    <g transform="rotate(-12, 7.5, 7.5)">
      <!-- Row 1 -->
      <rect x="0"  y="0" width="5" height="5" fill="#ff6b2b" rx="0.4"/>
      <rect x="5"  y="0" width="5" height="5" fill="#f5f5f5" rx="0.4"/>
      <rect x="10" y="0" width="5" height="5" fill="#ff6b2b" rx="0.4"/>
      <!-- Row 2 -->
      <rect x="0"  y="5" width="5" height="5" fill="#f5f5f5" rx="0.4"/>
      <rect x="5"  y="5" width="5" height="5" fill="#ff6b2b" rx="0.4"/>
      <rect x="10" y="5" width="5" height="5" fill="#f5f5f5" rx="0.4"/>
      <!-- Row 3 -->
      <rect x="0"  y="10" width="5" height="5" fill="#ff6b2b" rx="0.4"/>
      <rect x="5"  y="10" width="5" height="5" fill="#f5f5f5" rx="0.4"/>
      <rect x="10" y="10" width="5" height="5" fill="#ff6b2b" rx="0.4"/>
    </g>
  </g>

  <!-- "SIM STORE" subtitle — white, lighter weight, tracked out -->
  <text x="3" y="45" class="logo-main"
        font-size="14" font-weight="500" fill="#f5f5f5"
        letter-spacing="5.5">SIM STORE</text>
</svg>